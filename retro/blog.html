<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日記・雑記 // wired</title>
<link rel="stylesheet" href="/retro/retro.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="/retro/retro-utils.js"></script>
<style>
  html, body { min-height: 100%; }
</style>
</head>
<body class="theme-blog">

<!-- WINDOWS XP CHROME -->
<div class="win-chrome">
  <div class="win-chrome-row1">
    <button class="win-btn" onclick="goTo('terminal')">← 戻る</button>
    <button class="win-btn" style="opacity:0.45;cursor:default;" title="進むページがありません">→ 進む</button>
    <button class="win-btn" onclick="location.reload()">⟳ 更新</button>
    <button class="win-btn" onclick="goTo('terminal')">🏠 ホーム</button>
    <span style="display:inline-block;width:1px;height:28px;background:#aaa;margin:0 4px;"></span>
    <button class="win-btn" onclick="goTo('blog')">日記</button>
    <button class="win-btn" onclick="goTo('portfolio')">作品</button>
    <button class="win-btn" onclick="goTo('micro')">一言</button>
    <button class="win-btn" onclick="goTo('about')">自己紹介</button>
    <button class="win-btn" onclick="goTo('links')">リンク</button>
    <span class="win-chrome-title">COPLAND OS NAVIGATOR v4.017</span>
  </div>
  <div class="win-chrome-row2">
    <span class="win-addr-label">アドレス ▼</span>
    <input type="text" class="win-addr-bar" value="http://www.wired.local/blog/" readonly>
  </div>
  <div class="win-chrome-row3">
    <span class="win-nav-icon">🌐</span>
    <button class="win-nav-btn" onclick="goTo('blog')">■ 日記・雑記</button>
    <span style="opacity:0.3">|</span>
    <button class="win-nav-btn" onclick="goTo('terminal')">[ terminal ]</button>
    <span class="blink" style="margin-left:auto;margin-right:8px;font-family:'Press Start 2P',monospace;font-size:8px;color:#6a0d91;">∗ ONLINE ∗</span>
  </div>
</div>

<div class="retro-deco-left"></div>
<div class="retro-deco-right"></div>

<div class="retro-container" id="root"></div>

<script>
async function renderList() {
  let posts = [];
  try {
    const r = await fetch('/api/posts');
    const data = await r.json();
    posts = data.posts ?? [];
  } catch (e) {}

  const entries = posts.length ? posts.map(p => `
    <div class="blog-entry" onclick="renderDetail('${p.slug}')">
      <div class="blog-entry-head">
        <div class="blog-date">■ ${p.created_at.slice(0,10).replace(/-/g,'.')}</div>
      </div>
      <div class="blog-entry-body">
        <div class="blog-title">${p.title}</div>
      </div>
    </div>
    <div class="pixel-hr"></div>
  `).join('') : '<div style="opacity:0.4;padding:24px 0;text-align:center;">∗ no entries yet ∗</div>';

  const lastDate = posts.length ? posts[0].created_at.slice(0,10).replace(/-/g,'.') : '—';

  document.getElementById('root').innerHTML = `
    <div class="jp-only-banner">文字サイズ「中」推奨 ∗ タイトルクリックで全文表示</div>

    <div class="retro-header">
      <h1>■ 日記・雑記 ■</h1>
      <div class="subtitle">blog // the wired remembers everything</div>
    </div>

    ${counter()}

    ${NAV_HTML}

    <div class="retro-marquee">
      <div class="retro-marquee-inner">
        ★ ようこそ！リンクフリーですがご一報いただけると嬉しいです ★ 更新は不定期 ★ 文字サイズ中推奨 ★ タイトルをクリックすると全文が読めます ★ welcome to the wired ★ no matter where you go, everyone is always connected ★
      </div>
    </div>

    <div class="last-updated">Last updated: ${lastDate}</div>

    ${sparkles(['★','∗','☆','∗','★','∗','☆','∗'])}

    <div class="deco-dots">・ ・ ・ ・ ・</div>

    ${entries}

    <div class="kaomoji-strip">
      <span class="kao">(´・ω・\`)</span>
      <span class="kao blink-slow">( ´_ゝ\`)</span>
      <span class="kao">(｀・ω・´)</span>
    </div>

    <div class="deco-dots">・ ・ ・ ・ ・</div>

    <div class="retro-footer">
      Powered by copper, fiber, and protocol_7<br>
      <span class="blink">∗</span> This page is link-free. リンクフリーです。 <span class="blink">∗</span><br>
      Best viewed at 1024×768 // Copland OS Navigator
    </div>
  `;
}

async function renderDetail(slug) {
  let post;
  try {
    const r = await fetch(`/api/posts/${slug}`);
    const data = await r.json();
    post = data.post;
  } catch (e) {}
  if (!post) return;

  const date = post.created_at.slice(0,10).replace(/-/g,'.');

  document.getElementById('root').innerHTML = `
    ${NAV_HTML}
    <a class="detail-back" onclick="renderList()">← back to 日記</a>
    <div class="detail-date">■ ${date}</div>
    <div class="detail-title">${post.title}</div>
    <div class="pixel-hr"></div>
    <div class="detail-body">${renderMarkdown(post.body)}</div>
    <div class="pixel-hr" style="margin-top:16px;"></div>
    ${sparkles(['★','・','★','・','★','・','★','・'])}
    <div class="retro-footer">Powered by copper, fiber, and protocol_7</div>
  `;
  window.scrollTo(0, 0);
}

renderList();
</script>
</body>
</html>
