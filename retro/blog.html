<div class="retro-deco-left"></div>
<div class="retro-deco-right"></div>

<div class="retro-container" id="root"></div>

<script>
function setAddr(path) {
  document.getElementById('addr-bar').value = path;
}

function updateMeta(title, description, url) {
  document.title = title;
  document.querySelector('meta[property="og:title"]').setAttribute('content', title);
  document.querySelector('meta[property="og:description"]').setAttribute('content', description);
  document.querySelector('meta[property="og:url"]').setAttribute('content', url);
  document.querySelector('meta[name="description"]').setAttribute('content', description);
}

async function renderList(pushState = false) {
  if (pushState) {
    history.pushState({ view: 'list' }, '', '/blog');
  }
  setAddr('/blog');
  updateMeta(
    'blog // wired',
    'Personal blog — notes, thoughts, and writing from the wired.',
    '/blog'
  );

  let posts = [];
  try {
    const r = await fetch('/api/posts');
    const data = await r.json();
    posts = data.posts ?? [];
  } catch (e) {}

  const entries = posts.length ? posts.map(p => `
    <div class="blog-entry" onclick="renderDetail('${p.slug}', true)">
      <div class="blog-entry-head">
        <div class="blog-date">■ ${p.created_at.slice(0,10).replace(/-/g,'.')}</div>
        <div style="display:flex;align-items:center;gap:4px;">
          ${p.pinned ? '<span class="badge-pin">PIN</span>' : ''}
          ${p.is_new ? '<span class="badge-new">NEW</span>' : ''}
        </div>
      </div>
      <div class="blog-entry-body">
        <div class="blog-title">${p.title}</div>
      </div>
    </div>
    <div class="pixel-hr"></div>
  `).join('') : '<div style="opacity:0.4;padding:24px 0;text-align:center;">∗ no entries yet ∗</div>';

  const lastDate = posts.length ? posts[0].created_at.slice(0,10).replace(/-/g,'.') : '—';

  document.getElementById('root').innerHTML = `
    <div class="retro-header">
      <h1>■ 日記・雑記 ■</h1>
      <div class="subtitle">blog // the wired remembers everything</div>
    </div>

    ${counter()}

    ${NAV_HTML}

    <div class="retro-marquee">
      <div class="retro-marquee-inner">
        ★ ようこそ！リンクフリーですがご一報いただけると嬉しいです ★ 更新は不定期 ★ welcome to the wired ★ no matter where you go, everyone is always connected ★
      </div>
    </div>

    <div class="last-updated">Last updated: ${lastDate}</div>

    <div id="search-wrap">
      <div class="blog-entry-head" style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-family:'Press Start 2P',monospace;font-size:7px;color:#6a0d91;letter-spacing:2px;">// SEARCH //</span>
        <div style="display:flex;gap:6px;align-items:center;flex:1;min-width:0;">
          <input type="text" id="search-input" placeholder="keyword…" maxlength="100"
            style="flex:1;min-width:0;background:#fff8ff;border:2px groove #dbb6af;color:#2a0a3a;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:3px 7px;outline:none;">
          <button onclick="runSearch()"
            style="background:#dddde1;border:2px groove #c8c9ce;box-shadow:1px 1px 3px rgba(0,0,0,0.25);color:#2a0a3a;font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;padding:4px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0;">[ GO ]</button>
        </div>
      </div>
      <div id="search-results"></div>
    </div>

    ${sparkles(['★','∗','☆','∗','★','∗','☆','∗'])}

    ${entries}

    <div class="kaomoji-strip">
      <span class="kao">(´・ω・\`)</span>
      <span class="kao blink-slow">( ´_ゝ\`)</span>
      <span class="kao">(｀・ω・´)</span>
    </div>

    ${sparkles(['★','∗','☆','∗','★','∗','☆','∗'])}

    <div class="retro-footer">
      Powered by copper, fiber, and protocol_7<br>
      <span class="blink">∗</span> This page is link-free. リンクフリーです。 <span class="blink">∗</span><br>
      Best viewed at 1024×768 // Copland OS Navigator
    </div>
  `;
}

async function renderDetail(slug, pushState = false) {
  if (pushState) {
    history.pushState({ view: 'detail', slug }, '', `/blog/${slug}`);
  }
  setAddr(`/blog/${slug}`);

  let post;
  try {
    const r = await fetch(`/api/posts/${slug}`);
    const data = await r.json();
    post = data.post;
  } catch (e) {}
  if (!post) {
    document.getElementById('root').innerHTML = '<div style="opacity:0.4;padding:24px 0;text-align:center;">∗ post not found ∗</div>';
    return;
  }

  const date = post.created_at.slice(0,10).replace(/-/g,'.');
  updateMeta(
    `${post.title} // wired`,
    post.body ? post.body.replace(/[#*`>\-]/g, '').trim().slice(0, 155) : `${post.title} — from the wired.`,
    `/blog/${slug}`
  );

  document.getElementById('root').innerHTML = `
    ${NAV_HTML}
    <a class="detail-back" onclick="renderList(true)" style="cursor:pointer;">← back to 日記</a>
    <div class="detail-date">■ ${date}</div>
    <div class="detail-title">${post.title} ${post.is_new ? '<span class="badge-new">NEW</span>' : ''}</div>
    <div class="pixel-hr"></div>
    <div class="detail-body">${renderMarkdown(post.body)}</div>
    <div class="pixel-hr" style="margin-top:16px;"></div>
    ${sparkles(['★','・','★','・','★','・','★','・'])}
    <div class="retro-footer">Powered by copper, fiber, and protocol_7</div>
  `;
  window.scrollTo(0, 0);
}

async function runSearch() {
  const q = (document.getElementById('search-input')?.value ?? '').trim();
  const out = document.getElementById('search-results');
  if (!out) return;
  if (!q) { out.innerHTML = ''; return; }

  out.innerHTML = `
    <div class="blog-entry-body" style="font-family:'Silkscreen',monospace;font-size:10px;color:#6a0d91;opacity:0.6;border-top:none;">
      searching…
    </div>`;

  let data;
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    data = await r.json();
    if (!r.ok) throw new Error(data.error);
  } catch (e) {
    out.innerHTML = `
      <div class="blog-entry-body" style="font-family:'Silkscreen',monospace;font-size:10px;color:#b30000;border-top:none;">
        ∗ ${e.message || 'search error'}
      </div>`;
    return;
  }

  if (!data.results.length) {
    out.innerHTML = `
      <div class="blog-entry-body" style="font-family:'Silkscreen',monospace;font-size:10px;color:#6a0d91;opacity:0.5;border-top:none;">
        ∗ no results for that query
      </div>`;
    return;
  }

  out.innerHTML = data.results.map(r => `
    <div class="blog-entry" onclick="renderDetail('${r.slug}', true)">
      <div class="blog-entry-head" style="border-top:none;">
        <div class="blog-date">■ result</div>
      </div>
      <div class="blog-entry-body">
        <div class="blog-title">${r.title}</div>
        <div style="font-size:11px;color:#2a0a3a;opacity:0.65;margin-top:4px;font-weight:300;line-height:1.6;">${r.snippet}</div>
      </div>
    </div>
  `).join('');
}

// Handle browser back/forward
window.addEventListener('popstate', (e) => {
  if (e.state?.view === 'detail') {
    renderDetail(e.state.slug, false);
  } else {
    renderList(false);
  }
});

// Search — Enter key support (input is injected into DOM dynamically, so delegate)
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement?.id === 'search-input') runSearch();
});

// Boot: check URL path to decide what to render
const slug = window.location.pathname.match(/^\/blog\/(.+)/)?.[1];
if (slug) {
  renderDetail(slug, false);
} else {
  renderList(false);
}
</script>
