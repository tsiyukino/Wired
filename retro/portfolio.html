<div class="retro-deco-left"></div>
<div class="retro-deco-right"></div>

<div class="retro-container" id="root"></div>

<script>
function setAddr(path) {
  document.getElementById('addr-bar').value = 'http://www.wired.local' + path + (path.endsWith('/') ? '' : '/');
}

function updateMeta(title, description, url) {
  document.title = title;
  document.querySelector('meta[property="og:title"]').setAttribute('content', title);
  document.querySelector('meta[property="og:description"]').setAttribute('content', description);
  document.querySelector('meta[property="og:url"]').setAttribute('content', url);
  document.querySelector('meta[name="description"]').setAttribute('content', description);
}

async function renderList(pushState = false) {
  if (pushState) {
    history.pushState({ view: 'list' }, '', '/works');
  }
  setAddr('/works');
  updateMeta(
    'works // wired',
    'Portfolio of projects and works from the wired.',
    '/works'
  );

  let works = [];
  try {
    const r = await fetch('/api/works');
    const data = await r.json();
    works = data.works ?? [];
  } catch (e) {}

  const entries = works.length ? works.map(w => `
    <div class="blog-entry" onclick="renderDetail('${w.slug}', true)">
      <div class="blog-entry-head">
        <div class="blog-date">◆ ${w.slug}</div>
        <div style="display:flex;align-items:center;gap:4px;">
          <span class="blog-tags">${w.tech}</span>
          ${w.pinned ? '<span class="badge-pin">PIN</span>' : ''}
          ${w.is_new ? '<span class="badge-new">NEW</span>' : ''}
        </div>
      </div>
      <div class="blog-entry-body">
        <div class="blog-title">${w.title}</div>
      </div>
    </div>
    <div class="pixel-hr"></div>
  `).join('') : '<div style="opacity:0.4;padding:24px 0;text-align:center;">∗ no works yet ∗</div>';

  document.getElementById('root').innerHTML = `
    <div class="retro-header">
      <h1>■ 作品集 ■</h1>
      <div class="subtitle">works // portfolio</div>
    </div>

    ${counter()}
    ${NAV_HTML}

    <div class="retro-marquee">
      <div class="retro-marquee-inner">
        ◆ portfolio // click any item to read more ◆ リンクフリー ◆ built on protocol_7 ◆ copper and code ◆
      </div>
    </div>

    ${sparkles(['◆','◇','◆','◇','◆','◇','◆','◇'])}

    ${entries}

    <div class="kaomoji-strip">
      <span class="kao">(ﾉ◕ヮ◕)ﾉ*:･ﾟ✧</span>
      <span class="kao blink-slow">(ง •̀_•́)ง</span>
      <span class="kao">＼(٥⁀▽⁀ )／</span>
    </div>

    ${sparkles(['◆','◇','◆','◇','◆','◇','◆','◇'])}

    <div class="retro-footer">
      リンクフリー ∗ <span class="blink">∗</span> link-free<br>
      Best viewed with Copland OS Navigator
    </div>
  `;
}

async function renderDetail(slug, pushState = false) {
  if (pushState) {
    history.pushState({ view: 'detail', slug }, '', `/works/${slug}`);
  }
  setAddr(`/works/${slug}`);

  let work;
  try {
    const r = await fetch(`/api/works/${slug}`);
    const data = await r.json();
    work = data.work;
  } catch (e) {}
  if (!work) {
    document.getElementById('root').innerHTML = '<div style="opacity:0.4;padding:24px 0;text-align:center;">∗ work not found ∗</div>';
    return;
  }

  updateMeta(
    `${work.title} // wired`,
    work.body ? work.body.replace(/[#*`>\-]/g, '').trim().slice(0, 155) : `${work.title} — from the wired.`,
    `/works/${slug}`
  );

  document.getElementById('root').innerHTML = `
    ${NAV_HTML}
    <a class="detail-back" onclick="renderList(true)" style="cursor:pointer;">← back to 作品集</a>
    <div class="detail-title">${work.title} ${work.is_new ? '<span class="badge-new">NEW</span>' : ''}</div>
    <div class="pixel-hr"></div>
    <div class="detail-body">${renderMarkdown(work.body)}</div>
    <div class="pf-tech" style="margin-top:16px;">技術: ${work.tech}</div>
    <div class="pixel-hr" style="margin-top:16px;"></div>
    ${sparkles(['◆','◇','◆','◇','◆','◇','◆','◇'])}
    <div class="retro-footer">リンクフリー ∗ link-free</div>
  `;
  window.scrollTo(0, 0);
}

// Handle browser back/forward
window.addEventListener('popstate', (e) => {
  if (e.state?.view === 'detail') {
    renderDetail(e.state.slug, false);
  } else {
    renderList(false);
  }
});

// Boot: check URL path to decide what to render
const slug = window.location.pathname.match(/^\/works\/(.+)/)?.[1];
if (slug) {
  renderDetail(slug, false);
} else {
  renderList(false);
}
</script>
