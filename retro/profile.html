<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>profile // wired</title>
<link rel="stylesheet" href="/retro/retro.css">
<script src="/retro/retro-utils.js"></script>
<style>
html, body { min-height: 100%; }
body { background-color: #fcd0fe; }
.profile-wrap {
  width: 100%; max-width: 560px;
  margin: 0 auto;
  padding: 134px 18px 40px;
}
.profile-card {
  background: rgba(252,208,254,0.5);
  border: 2px groove #dbb6af;
  box-shadow: 2px 1px 4px #dbb6af inset;
  padding: 20px 22px;
}
.profile-top {
  display: flex; gap: 16px; align-items: flex-start;
  margin-bottom: 14px;
}
.profile-avatar img {
  width: 88px; height: 88px; object-fit: cover;
  border: 2px groove #dbb6af; display: block;
  image-rendering: pixelated;
}
.profile-avatar-empty {
  width: 88px; height: 88px;
  border: 2px groove #dbb6af;
  background: rgba(252,208,254,0.3);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Press Start 2P', monospace; font-size: 18px; color: #dbb6af;
}
.profile-names { flex: 1; }
.profile-display {
  font-family: 'Silkscreen', monospace;
  font-size: 16px; font-weight: 700; color: #6a0d91;
  margin-bottom: 4px;
}
.profile-username {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; color: #2a0a3a; opacity: 0.6;
  margin-bottom: 6px;
}
.profile-since {
  font-family: 'Silkscreen', monospace;
  font-size: 8px; color: #6a0d91; opacity: 0.5;
}
.profile-bio {
  font-size: 12px; color: #2a0a3a; line-height: 1.6;
  margin-bottom: 10px;
  font-family: 'IBM Plex Mono', monospace;
  white-space: pre-wrap;
}
.profile-site {
  font-family: 'Silkscreen', monospace; font-size: 10px; color: #6a0d91;
}
.profile-site a { color: #6a0d91; }
.status-msg {
  font-family: 'Silkscreen', monospace; font-size: 10px; color: #6a0d91; opacity: 0.45;
  text-align: center; padding: 40px 0;
}
</style>
</head>
<body class="theme-blog">

    <button class="win-btn" onclick="history.back()" title="back"></button>
    <button class="win-btn" onclick="location.reload()" title="reload"></button>
    <button class="win-btn" onclick="goTo('terminal')" title="home"></button>
    <span class="win-btn-sep"></span>
    <button class="win-btn-link" onclick="goTo('blog')" title="diary"><svg width="14" height="14" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated"><rect x="2" y="3" width="5" height="10" fill="#6a0d91"/><rect x="9" y="3" width="5" height="10" fill="#6a0d91"/><rect x="7" y="3" width="2" height="10" fill="#c677d3"/><rect x="3" y="4" width="3" height="1" fill="#fcd0fe"/><rect x="3" y="6" width="3" height="1" fill="#fcd0fe"/><rect x="3" y="8" width="3" height="1" fill="#fcd0fe"/><rect x="10" y="4" width="3" height="1" fill="#fcd0fe"/><rect x="10" y="6" width="3" height="1" fill="#fcd0fe"/><rect x="10" y="8" width="3" height="1" fill="#fcd0fe"/></svg></button>
    <button class="win-btn-link" onclick="goTo('portfolio')" title="works"><svg width="14" height="14" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated"><rect x="4" y="2" width="4" height="2" fill="#6a0d91"/><rect x="3" y="4" width="2" height="2" fill="#6a0d91"/><rect x="7" y="4" width="2" height="2" fill="#6a0d91"/><rect x="3" y="6" width="6" height="2" fill="#6a0d91"/><rect x="5" y="8" width="2" height="2" fill="#6a0d91"/><rect x="6" y="9" width="2" height="2" fill="#6a0d91"/><rect x="7" y="10" width="2" height="2" fill="#6a0d91"/><rect x="8" y="11" width="2" height="2" fill="#6a0d91"/><rect x="9" y="12" width="3" height="2" fill="#6a0d91"/><rect x="5" y="4" width="2" height="2" fill="#c677d3"/></svg></button>

    <button class="win-btn-link" onclick="goTo('about')" title="about"><svg width="14" height="14" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated"><rect x="6" y="2" width="4" height="4" fill="#6a0d91"/><rect x="5" y="3" width="1" height="2" fill="#6a0d91"/><rect x="10" y="3" width="1" height="2" fill="#6a0d91"/><rect x="5" y="6" width="6" height="2" fill="#6a0d91"/><rect x="4" y="8" width="8" height="5" fill="#6a0d91"/><rect x="3" y="9" width="2" height="4" fill="#6a0d91"/><rect x="11" y="9" width="2" height="4" fill="#6a0d91"/><rect x="6" y="3" width="4" height="2" fill="#c677d3"/></svg></button>
    <button class="win-btn-link" onclick="goTo('links')" title="links"><svg width="14" height="14" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated"><rect x="2" y="5" width="6" height="2" fill="#6a0d91"/><rect x="2" y="9" width="6" height="2" fill="#6a0d91"/><rect x="2" y="7" width="2" height="2" fill="#6a0d91"/><rect x="6" y="7" width="2" height="2" fill="#6a0d91"/><rect x="8" y="5" width="6" height="2" fill="#6a0d91"/><rect x="8" y="9" width="6" height="2" fill="#6a0d91"/><rect x="12" y="7" width="2" height="2" fill="#6a0d91"/><rect x="3" y="6" width="4" height="4" fill="#fcd0fe"/><rect x="9" y="6" width="4" height="4" fill="#fcd0fe"/><rect x="6" y="7" width="4" height="2" fill="#6a0d91"/></svg></button>
    <span class="win-chrome-title" id="chrome-title">COPLAND OS NAVIGATOR v4.017</span>
  </div>
  <div class="win-chrome-row2">
    <span class="win-addr-label">アドレス ▼</span>
    <input type="text" class="win-addr-bar" id="addr-bar" value="wired://u/..." readonly>
  </div>
  <div class="win-chrome-row3">
    <span class="win-nav-icon"></span>
    <button class="win-nav-btn" id="nav-name">...</button>
    <span class="blink" style="margin-left:auto;margin-right:8px;font-family:'Press Start 2P',monospace;font-size:8px;color:#6a0d91;">∗ ONLINE ∗</span>
  </div>
</div>
<script>
document.querySelector('.win-chrome-row1 .win-btn:nth-child(1)').innerHTML = ICON_BACK;
document.querySelector('.win-chrome-row1 .win-btn:nth-child(2)').innerHTML = ICON_REFRESH;
document.querySelector('.win-chrome-row1 .win-btn:nth-child(3)').innerHTML = ICON_HOME;
document.querySelector('.win-nav-icon').innerHTML = ICON_GLOBE;
</script>

<div class="retro-deco-left"></div>
<div class="retro-deco-right"></div>

<div class="profile-wrap">
  <div class="profile-card" id="profile-card">
    <div class="status-msg">∗ waiting for connection ∗</div>
  </div>
</div>

<script type="module">
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  async function loadProfile(username) {
    const card = document.getElementById('profile-card');
    document.getElementById('addr-bar').value    = `wired://u/${username}`;
    document.getElementById('chrome-title').textContent = `COPLAND OS NAVIGATOR v4.017 // @${username}`;
    document.getElementById('nav-name').textContent     = `@${username}`;
    card.innerHTML = `<div class="status-msg">connecting...</div>`;

    const r = await fetch(`/api/user/${username}`).catch(() => null);
    if (!r || !r.ok) {
      card.innerHTML = `<div class="status-msg">∗ user not found ∗</div>`;
      return;
    }
    const { user } = await r.json();
    document.getElementById('nav-name').textContent = user.display_name;

    const avatarHtml = user.avatar_path
      ? `<div class="profile-avatar"><img src="/retro/content/avatars/${esc(user.avatar_path)}" alt="avatar"></div>`
      : `<div class="profile-avatar"><div class="profile-avatar-empty">?</div></div>`;

    const siteHtml = user.site_url
      ? `<div class="profile-site">[ <a href="${esc(user.site_url)}" target="_blank" rel="noopener noreferrer">${esc(user.site_url)}</a> ]</div>`
      : '';

    card.innerHTML = `
      <div class="profile-top">
        ${avatarHtml}
        <div class="profile-names">
          <div class="profile-display">${esc(user.display_name)}</div>
          <div class="profile-username">@${esc(user.username)}</div>
          <div class="profile-since">joined ${(user.created_at ?? '').slice(0, 10)}</div>
        </div>
      </div>
      ${user.bio ? `<div class="profile-bio">${esc(user.bio)}</div>` : ''}
      ${siteHtml}
    `;
  }

  // Listen for the username being passed from the OS
  window.addEventListener('message', (e) => {
    if (e.data?.action === 'load' && e.data.data?.username) {
      loadProfile(e.data.data.username);
    }
  });

  // Also handle direct URL access: /u/:username
  const parts = location.pathname.split('/');
  if (parts[1] === 'u' && parts[2]) loadProfile(parts[2]);
</script>
</body>
</html>
