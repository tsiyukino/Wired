<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一言 // wired</title>
<link rel="stylesheet" href="/retro/retro.css">
<script src="/retro/retro-utils.js"></script>
</head>
<body class="theme-micro">

<!-- WINDOWS XP CHROME -->
<div class="win-chrome">
  <div class="win-chrome-row1">
    <button class="win-btn" onclick="history.back()" title="back"></button>
    <button class="win-btn" onclick="location.reload()" title="reload"></button>
    <button class="win-btn" onclick="goTo('terminal')" title="home"></button>
    <span class="win-btn-sep"></span>
    <button class="win-btn-link" onclick="goTo('blog')" title="diary" id="nav-blog"></button>
    <button class="win-btn-link" onclick="goTo('portfolio')" title="works" id="nav-works"></button>
    <button class="win-btn-link active" onclick="goTo('micro')" title="micro" id="nav-micro"></button>
    <button class="win-btn-link" onclick="goTo('about')" title="about" id="nav-about"></button>
    <button class="win-btn-link" onclick="goTo('links')" title="links" id="nav-links"></button>
    <span class="win-chrome-title">COPLAND OS NAVIGATOR v4.017</span>
  </div>
  <div class="win-chrome-row2">
    <span class="win-addr-label">アドレス ▼</span>
    <input type="text" class="win-addr-bar" value="http://www.wired.local/micro/" readonly style="background:#e8d0ff;">
  </div>
  <div class="win-chrome-row3">
    <span class="win-nav-icon"></span>
    <button class="win-nav-btn" onclick="goTo('micro')">∗ 一言</button>
    <span class="blink" style="margin-left:auto;margin-right:8px;font-family:'Press Start 2P',monospace;font-size:8px;color:#6a0d91;">∗ ONLINE ∗</span>
  </div>
</div>
<script>
document.querySelector('.win-chrome-row1 .win-btn:nth-child(1)').innerHTML = ICON_BACK;
document.querySelector('.win-chrome-row1 .win-btn:nth-child(2)').innerHTML = ICON_REFRESH;
document.querySelector('.win-chrome-row1 .win-btn:nth-child(3)').innerHTML = ICON_HOME;
document.getElementById('nav-blog').innerHTML = ICON_DIARY;
document.getElementById('nav-works').innerHTML = ICON_WORKS;
document.getElementById('nav-micro').innerHTML = ICON_MICRO;
document.getElementById('nav-about').innerHTML = ICON_ABOUT;
document.getElementById('nav-links').innerHTML = ICON_LINKS;
document.querySelector('.win-nav-icon').innerHTML = ICON_GLOBE;
</script>

<div class="retro-deco-left"></div>
<div class="retro-deco-right"></div>

<div class="retro-container" id="root"></div>

<script>
async function renderMicro() {
  let posts = [];
  try {
    const r = await fetch('/api/micro');
    const data = await r.json();
    posts = data.posts ?? [];
  } catch (e) {}

  const items = posts.length ? posts.map(p => `
    <div class="micro-item">
      <div class="micro-time">${p.created_at.slice(0,16).replace('T',' ')}</div>
      <div class="micro-text">${p.text}</div>
    </div>
    <div class="pixel-hr"></div>
  `).join('') : '<div style="opacity:0.4;padding:24px 0;text-align:center;">∗ transmission pending ∗</div>';

  document.getElementById('root').innerHTML = `
    <div class="retro-header">
      <h1>■ 一言 ■</h1>
      <div class="subtitle">micro-posts // short thoughts</div>
    </div>

    ${counter()}
    ${NAV_HTML}

    <div class="retro-marquee">
      <div class="retro-marquee-inner">
        ☆ 短い思いつきとか、メモとか ☆ 更新頻度高め ☆ thoughts from the wired ☆ no matter where you go ☆
      </div>
    </div>

    ${sparkles(['∗','·','∗','·','∗','·','∗','·'])}
    <div class="deco-dots">∗ ∗ ∗ ∗ ∗</div>

    ${items}

    <div class="kaomoji-strip">
      <span class="kao blink-slow">(´・ω・\`)</span>
      <span class="kao">(　-_-)ノ</span>
      <span class="kao blink-slow">(ﾟдﾟ)</span>
    </div>

    <div class="deco-dots">∗ ∗ ∗ ∗ ∗</div>

    <div class="retro-footer">
      ひとりごと ∗ <span class="blink">∗</span> monologue<br>
      Best viewed with Copland OS Navigator
    </div>
  `;
}

renderMicro();
</script>
</body>
</html>
